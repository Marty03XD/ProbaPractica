<!DOCTYPE html>
<html lang="ro" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title}">Autobrand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<body th:fragment="body(className)" th:class="${className}">
<th:block th:replace="~{::content}">Content</th:block>
</body>

<header th:fragment="header(subtitle, backUrl)" class="topbar">
    <div class="brand">
        <div class="brand-mark" aria-hidden="true">AB</div>
        <div>
            <h1>Autobrand</h1>
            <p th:text="${subtitle}">Proba practica</p>
        </div>
    </div>
    <nav class="topbar-actions">
        <a th:if="${backUrl != null}" th:href="@{${backUrl}}" class="btn btn-ghost">Inapoi</a>
        <form th:action="@{/logout}" method="post" sec:authorize="isAuthenticated()">
            <button type="submit" class="btn btn-ghost">Deconectare</button>
        </form>
    </nav>
</header>

<div th:fragment="alerts">
    <div th:if="${message}" class="alert alert-success" role="status">
        <span class="alert-icon" aria-hidden="true">&#10003;</span>
        <span th:text="${message}"></span>
    </div>
    <div th:if="${error}" class="alert alert-error" role="alert">
        <span class="alert-icon" aria-hidden="true">!</span>
        <span th:text="${error}"></span>
    </div>
</div>

</html>
